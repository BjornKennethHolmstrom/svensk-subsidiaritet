<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient (subtle) -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9f9f7"/>
      <stop offset="100%" stop-color="#f4f4f0"/>
    </linearGradient>
    
    <!-- Node pattern for distributed network feel -->
    <pattern id="nodes" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#d4d4d0" opacity="0.4"/>
      <circle cx="40" cy="30" r="1.5" fill="#d4d4d0" opacity="0.3"/>
      <circle cx="70" cy="15" r="2.5" fill="#d4d4d0" opacity="0.35"/>
      <circle cx="20" cy="60" r="1.8" fill="#d4d4d0" opacity="0.3"/>
      <circle cx="60" cy="50" r="2" fill="#d4d4d0" opacity="0.4"/>
      <circle cx="50" cy="70" r="1.5" fill="#d4d4d0" opacity="0.25"/>
      <!-- Connecting lines -->
      <line x1="10" y1="10" x2="40" y2="30" stroke="#d4d4d0" stroke-width="0.5" opacity="0.3"/>
      <line x1="40" y1="30" x2="70" y2="15" stroke="#d4d4d0" stroke-width="0.5" opacity="0.3"/>
      <line x1="20" y1="60" x2="60" y2="50" stroke="#d4d4d0" stroke-width="0.5" opacity="0.3"/>
      <line x1="60" y1="50" x2="50" y2="70" stroke="#d4d4d0" stroke-width="0.5" opacity="0.3"/>
      <line x1="10" y1="10" x2="20" y2="60" stroke="#d4d4d0" stroke-width="0.5" opacity="0.2"/>
      <line x1="70" y1="15" x2="60" y2="50" stroke="#d4d4d0" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#nodes)"/>

  <!-- Decorative line (top) -->
  <rect x="0" y="0" width="1200" height="6" fill="#111111"/>

  <!-- Main content group -->
  <g transform="translate(600, 280)">
    <!-- Main title (sans-serif) -->
    <text x="0" y="0" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="64" fill="#111111" letter-spacing="-0.5">
      Svensk Subsidiaritet
    </text>
    
    <!-- Subtitle (serif) -->
    <text x="0" y="60" text-anchor="middle" font-family="'Merriweather', Georgia, 'Times New Roman', serif" font-weight="400" font-style="italic" font-size="28" fill="#57534e">
      Manifest för distribuerad systemförståelse
    </text>
    
    <!-- Decorative divider -->
    <line x1="-180" y1="90" x2="180" y2="90" stroke="#d6d3d1" stroke-width="1.5"/>
    
    <!-- Quote line -->
    <text x="0" y="140" text-anchor="middle" font-family="'Merriweather', Georgia, serif" font-weight="400" font-size="22" fill="#44403c" font-style="italic">
      "Från centraliserad kontroll till nätverkad intelligens"
    </text>
  </g>

  <!-- Footer -->
  <g transform="translate(600, 580)">
    <text x="0" y="0" text-anchor="middle" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="14" fill="#78716c" letter-spacing="1">
      svensksubsidiaritet.se
    </text>
  </g>

  <!-- Small network icon (bottom left) -->
  <g transform="translate(80, 530)" opacity="0.6">
    <circle cx="0" cy="0" r="3" fill="#111111"/>
    <circle cx="30" cy="-10" r="3" fill="#111111"/>
    <circle cx="20" cy="20" r="3" fill="#111111"/>
    <line x1="0" y1="0" x2="30" y2="-10" stroke="#111111" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="20" y2="20" stroke="#111111" stroke-width="1.5"/>
    <line x1="30" y1="-10" x2="20" y2="20" stroke="#111111" stroke-width="1.5"/>
  </g>

  <!-- Small network icon (bottom right) -->
  <g transform="translate(1090, 530)" opacity="0.6">
    <circle cx="0" cy="0" r="3" fill="#111111"/>
    <circle cx="-30" cy="-10" r="3" fill="#111111"/>
    <circle cx="-20" cy="20" r="3" fill="#111111"/>
    <line x1="0" y1="0" x2="-30" y2="-10" stroke="#111111" stroke-width="1.5"/>
    <line x1="0" y1="0" x2="-20" y2="20" stroke="#111111" stroke-width="1.5"/>
    <line x1="-30" y1="-10" x2="-20" y2="20" stroke="#111111" stroke-width="1.5"/>
  </g>
</svg>
