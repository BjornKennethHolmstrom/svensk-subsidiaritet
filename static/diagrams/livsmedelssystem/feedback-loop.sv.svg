<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Detaljhandelskoncentration → Producentkoncentration</text>

  <!-- Top box: Retail concentration -->
  <rect x="200" y="50" width="280" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="340" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#712B13">Detaljhandelskoncentration</text>
  <text x="340" y="92" text-anchor="middle" font-size="12" fill="#993C1D">Tre kedjor kontrollerar 95 %</text>

  <!-- Bottom box: Producer concentration -->
  <rect x="200" y="240" width="280" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="340" y="262" text-anchor="middle" font-size="14" font-weight="bold" fill="#085041">Producentkoncentration</text>
  <text x="340" y="282" text-anchor="middle" font-size="12" fill="#0F6E56">25 % av gårdar → 80 % av värde</text>

  <!-- Arrow from Retail to Producer (right side) -->
  <line x1="480" y1="106" x2="480" y2="230" stroke="#888780" stroke-width="2"/>
  <polygon points="480,230 475,218 485,218" fill="#888780"/>
  <text x="500" y="160" font-size="12" fill="#5F5E5A">Volymkrav utesluter</text>
  <text x="500" y="176" font-size="12" fill="#5F5E5A">småskaliga producenter</text>

  <!-- Arrow from Producer to Retail (left side) -->
  <line x1="200" y1="240" x2="200" y2="116" stroke="#888780" stroke-width="2"/>
  <polygon points="200,116 195,128 205,128" fill="#888780"/>
  <text x="180" y="170" text-anchor="end" font-size="12" fill="#5F5E5A">Färre leverantörer</text>
  <text x="180" y="186" text-anchor="end" font-size="12" fill="#5F5E5A">ger större köparmakt</text>

  <!-- Center text -->
  <text x="340" y="175" text-anchor="middle" font-size="13" fill="#888780" font-weight="bold">Förstärkande loop</text>
  <text x="340" y="195" text-anchor="middle" font-size="12" fill="#888780">utan korrigeringsmekanism</text>

  <!-- Bottom consequence -->
  <text x="340" y="340" text-anchor="middle" font-size="13" fill="#E24B4A">→ 50 % importberoende trots 80 % självförsörjning 1950</text>
</svg>

